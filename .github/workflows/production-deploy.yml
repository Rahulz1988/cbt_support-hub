name: Production Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    env:
      REMOTE_HOST: ${{ secrets.SSH_HOST }}
      REMOTE_USER: ${{ secrets.SSH_USER }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      REMOTE_PATH: /var/www/cbt-support-hub
      BACKUP_DIR: /home/backups

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Trust production host
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          PORT="${SSH_PORT:-22}"
          ssh-keyscan -p "$PORT" -H "$REMOTE_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Backup existing deployment
        run: |
          set -euo pipefail
          PORT="${SSH_PORT:-22}"
          DATE="$(date +%d-%m-%y)"
          ssh -p "$PORT" "$REMOTE_USER@$REMOTE_HOST" "set -eu
            mkdir -p '$BACKUP_DIR'
            cd /var/www
            TMP_ARCHIVE='$BACKUP_DIR/${DATE}.zip.tmp'
            FINAL_ARCHIVE='$BACKUP_DIR/${DATE}.zip'
            rm -f \"\$TMP_ARCHIVE\"
            zip -qry \"\$TMP_ARCHIVE\" cbt-support-hub
            mv \"\$TMP_ARCHIVE\" \"\$FINAL_ARCHIVE\"
          "

      - name: Sync repository to production
        run: |
          set -euo pipefail
          PORT="${SSH_PORT:-22}"
          rsync -az --delete \
            --exclude='.env' \
            --exclude='.env.production' \
            --exclude='writable/' \
            --exclude='.git/' \
            --exclude='.github/' \
            -e "ssh -p $PORT" \
            ./ "$REMOTE_USER@$REMOTE_HOST:$REMOTE_PATH/"
